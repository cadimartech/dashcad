# Despliegue en NAS (Synology, ZimaOS, etc.)
# La imagen se publica automáticamente en ghcr.io desde GitHub Actions
#
# Uso en el NAS:
#   1. docker login ghcr.io (con tu token de GitHub)
#   2. scripts/migrate-nas-storage.sh        # mueve archivos viejos a /storage/cad (idempotente)
#   3. docker compose -f docker-compose.nas.yml pull
#   4. docker compose -f docker-compose.nas.yml up -d
#
# Layout en el host:
#   /ZimaOS-HD/AppData/dashcad/data/catalog/  -> SOLO parts.json (metadata)
#   /storage/cad/step/                        -> binarios STEP subidos
#   /storage/cad/glb/                         -> previews GLB (generados)
#   /storage/cad/thumb/                       -> thumbnails
#
services:
  dashcad:
    image: ghcr.io/cadimartech/dashcad:latest
    container_name: dashcad
    ports:
      - "3000:3000"
    volumes:
      - /ZimaOS-HD/AppData/dashcad/data/catalog:/app/catalog
      - /storage/cad:/app/files
    environment:
      - NODE_ENV=production
      - DASHCAD_FILES_PATH=/app/files
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
