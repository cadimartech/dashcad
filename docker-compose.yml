services:
  dashcad:
    build: .
    image: dashcad:latest
    container_name: dashcad
    ports:
      - "${DASHCAD_PORT:-3000}:3000"
    volumes:
      - ${DASHCAD_DATA_PATH:-./data/catalog}:/app/catalog
      - ${DASHCAD_FILES_PATH:-./data/files}:/app/files
    environment:
      - NODE_ENV=production
      - DASHCAD_FILES_PATH=/app/files
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
